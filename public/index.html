<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>消えるニックネームチャット</title>
</head>
<body>
    <div id="chat-container">
        <div class="chat-header">
            <h2>⏱️ Ephemeral Chat</h2>
            <p>一定時間で自動消滅するチャットルーム</p>
        </div>

        <div class="user-config">
            <input type="text" id="nickname" placeholder="ニックネーム（未入力は名無しさん）" maxlength="15">
            <div class="ttl-wrapper">
                <label for="ttl-select">消滅時間:</label>
                <select id="ttl-select">
                    <option value="30">30秒</option>
                    <option value="60">1分</option>
                    <option value="300">5分</option>
                    <option value="1800">30分</option>
                    <option value="3600" selected>1時間</option>
                </select>
            </div>
        </div>

        <div id="messages">
            <div class="system-msg">メッセージはありません。最初のチャットを投稿しよう！</div>
        </div>

        <div class="input-area">
            <input type="text" id="message" placeholder="メッセージを入力..." maxlength="200">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
